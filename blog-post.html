<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post - salem_myOJTBlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    * {
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: #050505;
      background-image: 
        radial-gradient(at 0% 0%, hsla(285, 98%, 15%, 1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(305, 98%, 20%, 1) 0, transparent 50%), 
        radial-gradient(at 50% 100%, hsla(325, 98%, 15%, 1) 0, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      color: white;
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    .glass-strong {
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.9);
    }

    .footer-gradient {
      background: #000;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .fade-in {
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* Slideshow Styles */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      opacity: 0;
      transition: opacity 0.6s ease-in-out;
      z-index: 1;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .slideshow-main-container {
      position: relative;
      border-radius: 2.5rem;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
      margin-bottom: 3rem;
      width: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(1.05);
      z-index: 1;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
      z-index: 2;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Indicators */
    .slideshow-indicators {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.75rem;
      z-index: 10;
    }

    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .indicator.active {
      background: #ec4899;
      transform: scale(1.3);
      box-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
    }


    .slideshow-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 32px;
      color: white;
      cursor: pointer;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .slideshow-arrow:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }

    .slideshow-arrow.left-0 {
      left: 20px;
    }

    .slideshow-arrow.right-0 {
      right: 20px;
    }

    /* Summary Section Glass Styles */
    .summary-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      padding: 3rem;
      margin-bottom: 3rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: fadeInUp 1s ease-out forwards;
    }

    .summary-title {
      font-size: 0.75rem;
      font-weight: 800;
      color: #ec4899;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin-bottom: 1rem;
      display: block;
    }

    .summary-dtr {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 1.5rem;
    }

    .summary-day {
      font-size: 2.5rem;
      font-weight: 900;
      color: white;
      letter-spacing: -0.02em;
    }

    .summary-time {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .summary-text {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.25rem;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .activity-section {
      background: rgba(236, 72, 153, 0.05);
      border-left: 4px solid #ec4899;
      padding: 1.5rem 2rem;
      border-radius: 0 1rem 1rem 0;
    }

    .activity-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #ec4899;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      display: block;
    }

    @media (max-width: 768px) {
      .slideshow-main-container {
        aspect-ratio: 4 / 3;
      }
      .summary-day {
        font-size: 1.75rem;
      }
      .summary-card {
        padding: 2rem;
      }
    }

    /* Social Media Icons */
    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
    }

    .social-icon:hover {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
    }

    .text-glow {
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    /* Post Button Styles */
    .btn-post {
      background: rgba(236, 72, 153, 0.2);
      border: 1px solid rgba(236, 72, 153, 0.4);
      color: #fce7f3;
      padding: 0.75rem 2rem;
      border-radius: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .btn-post:hover {
      background: rgba(236, 72, 153, 0.4);
      border-color: rgba(236, 72, 153, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(236, 72, 153, 0.5);
    }

    .btn-post:active {
      transform: translateY(0);
    }

    .btn-post:disabled {
      background: rgba(128, 128, 128, 0.2);
      border-color: rgba(128, 128, 128, 0.4);
      color: rgba(255, 255, 255, 0.4);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-edit {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.4);
      color: #bfdbfe;
      padding: 0.75rem 2rem;
      border-radius: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .btn-edit:hover {
      background: rgba(59, 130, 246, 0.4);
      border-color: rgba(59, 130, 246, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
    }

    .btn-edit:active {
      transform: translateY(0);
    }

    .btn-edit:disabled {
      background: rgba(128, 128, 128, 0.2);
      border-color: rgba(128, 128, 128, 0.4);
      color: rgba(255, 255, 255, 0.4);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .posted-thought-card {

      border-radius: 1.5rem;
      padding: 2rem;
      color: #000;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      margin-bottom: 1.5rem;
      position: relative;
      border-right: 6px solid #ec4899;
      animation: slideInDown 0.6s ease-out;
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .posted-tag {
      font-size: 0.65rem;
      font-weight: 800;
      color: #ec4899;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 0.75rem;
      display: block;
    }

    .success-badge {
      animation: badgeAppear 0.5s ease-out forwards;
    }

    @keyframes badgeAppear {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @media (max-width: 768px) {

    }

    @media (max-width: 640px) {

        margin-bottom: 0.5rem !important;

      nav div {
        gap: 0.375rem 0.5rem !important;
        font-size: 0.75rem !important;

        justify-content: center;
      }

      nav div a {
        padding: 0.25rem 0.375rem;
      }

        height: 35px;

      }

      .text-3xl {
        font-size: 1.25rem !important;
      }
    }

    @media (max-width: 480px) {
      nav {
        padding: 0.5rem !important;
      }

      nav h1 {

        margin-bottom: 0.5rem !important;

    .custom-scrollbar::-webkit-scrollbar-thumb {

    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* Glass Loading Animation */
    @keyframes glassShimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .glass-animate {

          rgba(255, 255, 255, 0.03) 75%);

    }

    .glass-card-appear {
      animation: fadeInUp 0.8s ease-out forwards;
      opacity: 0;
    }

      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <script src="blog-data.js?v=121"></script>
  <script>
    let currentSlide = 0;
    let autoPlayInterval;

    function changeSlide(direction) {
      const slides = document.querySelectorAll('#postSlideshow .slide');
      const indicators = document.querySelectorAll('#postSlideshow .indicator');
      if (!slides.length) return;

      slides[currentSlide].classList.remove('active');
      if (indicators.length) indicators[currentSlide].classList.remove('active');
      
      currentSlide = (currentSlide + direction + slides.length) % slides.length;
      
      slides[currentSlide].classList.add('active');
      if (indicators.length) indicators[currentSlide].classList.add('active');

      startAutoPlay();
    }

    function goToSlide(index) {
      const slides = document.querySelectorAll('#postSlideshow .slide');
      const indicators = document.querySelectorAll('#postSlideshow .indicator');
      if (!slides.length || index === currentSlide) return;

      slides[currentSlide].classList.remove('active');
      if (indicators.length) indicators[currentSlide].classList.remove('active');
      
      currentSlide = index;
      
      slides[currentSlide].classList.add('active');
      if (indicators.length) indicators[currentSlide].classList.add('active');

      startAutoPlay();
    }



    function startAutoPlay() {
      clearInterval(autoPlayInterval);
      autoPlayInterval = setInterval(() => {
        changeSlide(1);
      }, 5000);
    }

    function initPost() {
      // Get post ID from URL parameter
      const urlParams = new URLSearchParams(window.location.search);
      const postId = parseInt(urlParams.get('id')) || 0;

      if (postId < 0 || postId >= blogPosts.length) {
        // Invalid post ID, redirect to blog
        window.location.href = 'blog.html';
        return;
      }

      const post = blogPosts[postId];

      // Set page title
      document.title = post.title + ' - salem_myOJTBlog';

      // Set content
      document.getElementById('postDate').textContent = post.date;
      document.getElementById('postTitle').textContent = post.title;

      const messageContainer = document.getElementById('postMessageContainer');
      if (post.message && post.message.trim()) {
        messageContainer.textContent = post.message;
        messageContainer.classList.remove('hidden');
      } else {
        messageContainer.classList.add('hidden');
      }

      const slideshowContainer = document.getElementById('postSlideshow');
      slideshowContainer.innerHTML = '';

      // Setup Slideshow
      if (post.images.length > 0) {
        slideshowContainer.classList.remove('hidden');
        
        // Add slides
        post.images.forEach((img, index) => {
          const slide = document.createElement('div');
          slide.className = `slide ${index === 0 ? 'active' : ''}`;
          
          const imgElement = document.createElement('img');
          imgElement.src = img;
          imgElement.alt = post.title + ' - Image ' + (index + 1);
          slide.appendChild(imgElement);
          slideshowContainer.appendChild(slide);
        });

        // Add indicators if more than one image
        if (post.images.length > 1) {
          const indicatorContainer = document.createElement('div');
          indicatorContainer.className = 'slideshow-indicators';
          
          post.images.forEach((_, index) => {
            const dot = document.createElement('div');
            dot.className = `indicator ${index === 0 ? 'active' : ''}`;
            dot.onclick = () => goToSlide(index);
            indicatorContainer.appendChild(dot);
          });
          
          slideshowContainer.appendChild(indicatorContainer);

          const leftArrow = document.createElement('button');
          leftArrow.className = 'slideshow-arrow left-0';
          leftArrow.innerHTML = '‹';
          leftArrow.onclick = () => changeSlide(-1);
          slideshowContainer.appendChild(leftArrow);

          const rightArrow = document.createElement('button');
          rightArrow.className = 'slideshow-arrow right-0';
          rightArrow.innerHTML = '›';
          rightArrow.onclick = () => changeSlide(1);
          slideshowContainer.appendChild(rightArrow);
        }
      } else {
        slideshowContainer.classList.add('hidden');
      }



      // Setup Navigation Buttons

      const nextBtn = document.getElementById('nextPostBtn');
      const prevBtn = document.getElementById('prevPostBtn');

      // Next Button
      if (postId < blogPosts.length - 1) {
        nextBtn.href = `blog-post.html?id=${postId + 1}`;
        nextBtn.classList.remove('hidden');
      } else {
        nextBtn.classList.add('hidden');
      }

      // Previous Button
      if (postId > 0) {
        prevBtn.href = `blog-post.html?id=${postId - 1}`;
        prevBtn.classList.remove('hidden');
      } else {
        prevBtn.classList.add('hidden');
      }
    }

    function saveNote(postId, dayIndex) {
      const textarea = document.getElementById(`note-${postId}-${dayIndex}`);
      const postBtn = document.getElementById(`btn-${postId}-${dayIndex}`);
      const editBtn = document.getElementById(`edit-btn-${postId}-${dayIndex}`);
      const status = document.getElementById(`status-${postId}-${dayIndex}`);
      const content = textarea.value;

      if (!content.trim()) {
        alert("Please enter some thoughts before posting!");
        return;
      }

      // Password Protection
      const password = prompt("Enter password to post note:");
      if (password !== "8888") {
        alert("Incorrect password. Posting cancelled.");
        return;
      }

      const now = new Date();
      const dateString = now.toLocaleDateString('en-US', {
        month: 'long',
        day: 'numeric',
        year: 'numeric'
      });

      // Save to localStorage
      localStorage.setItem(`ojt-note-${postId}-${dayIndex}`, content);
      localStorage.setItem(`ojt-date-${postId}-${dayIndex}`, dateString);

      // Transition UI
      textarea.readOnly = true;
      postBtn.disabled = true;
      editBtn.classList.remove('hidden');

      // Show success status briefly
      status.classList.remove('hidden');
      setTimeout(() => {
        status.classList.add('hidden');
      }, 3000);
    }

    function editNote(postId, dayIndex) {
      const password = prompt("Enter password to edit note:");
      if (password !== "8888") {
        alert("Incorrect password. Action cancelled.");
        return;
      }

      const textarea = document.getElementById(`note-${postId}-${dayIndex}`);
      const postBtn = document.getElementById(`btn-${postId}-${dayIndex}`);
      
      // Enable editing
      textarea.readOnly = false;
      postBtn.disabled = false;
      
      // Focus the textarea
      textarea.focus();
      // Set cursor to end
      textarea.setSelectionRange(textarea.value.length, textarea.value.length);
    }

    // Dictionary to hold uploaded images for daily logs
    const daySlides = {};

    function previewImages(event, postId, dayIndex) {
      const files = event.target.files;
      if (!files || files.length === 0) return;

      const containerTarget = document.getElementById(`container-${postId}-${dayIndex}`);
      const slidesTarget = document.getElementById(`slides-${postId}-${dayIndex}`);
      const controlsTarget = document.getElementById(`controls-${postId}-${dayIndex}`);

      const key = `${postId}-${dayIndex}`;
      daySlides[key] = { images: [], current: 0 };

      slidesTarget.innerHTML = '';
      let loadedCount = 0;

      for (let i = 0; i < files.length; i++) {
        const reader = new FileReader();
        reader.onload = function (e) {
          daySlides[key].images.push(e.target.result);
          loadedCount++;
          if (loadedCount === files.length) {
            renderDaySlides(postId, dayIndex);
          }
        }
        reader.readAsDataURL(files[i]);
      }

      containerTarget.style.display = 'none';
      slidesTarget.classList.remove('hidden');
      if (files.length > 1) {
        controlsTarget.classList.remove('hidden');
      } else {
        controlsTarget.classList.add('hidden');
      }
    }

    function renderDaySlides(postId, dayIndex) {
      const key = `${postId}-${dayIndex}`;
      const data = daySlides[key];
      const slidesTarget = document.getElementById(`slides-${postId}-${dayIndex}`);

      slidesTarget.innerHTML = '';
      data.images.forEach((img, idx) => {
        const imgEl = document.createElement('img');
        imgEl.src = img;
        imgEl.className = `absolute inset-0 w-full h-full object-cover transition-opacity duration-300 pointer-events-none ${idx === data.current ? 'opacity-100' : 'opacity-0'}`;
        slidesTarget.appendChild(imgEl);
      });
    }

    function changeDaySlide(postId, dayIndex, direction, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      const key = `${postId}-${dayIndex}`;
      if (!daySlides[key]) return;

      const data = daySlides[key];
      const total = data.images.length;
      if (total <= 1) return;

      data.current = (data.current + direction + total) % total;
      renderDaySlides(postId, dayIndex);
    }

    // Initialize when page loads
    document.addEventListener('DOMContentLoaded', () => {
      initPost();
      startAutoPlay();
    });
  </script>

</body>
